name: Build Windows Executable

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install sippy flask twisted pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --add-data "data;data" --add-data "welcome.wav;." main.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: custom-sip-server-windows
        path: dist/main.exe
